kind = "web"
previewPath = "/"
title = "Chorcha Question Bank"
version = "1.0.0"
id = "artifacts/folder-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24503

[services.development]
run = "pnpm --filter @workspace/folder-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/folder-app", "run", "build" ]
publicDir = "artifacts/folder-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24503"
BASE_PATH = "/"
